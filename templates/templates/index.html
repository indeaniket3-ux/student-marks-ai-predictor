<!DOCTYPE html>
<html>
<head>
    <title>Student Marks AI Predictor</title>
</head>
<body>
    <h1>🎯 Student Marks AI Predictor</h1>

    <form method="POST">
        <label>Hours Studied:</label><br>
        <input type="number" step="0.1" name="study" required><br><br>

        <label>Hours Slept:</label><br>
        <input type="number" step="0.1" name="sleep" required><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>📊 Predicted Marks: {{ prediction }}</h2>
    {% endif %}
</body>
</html>
